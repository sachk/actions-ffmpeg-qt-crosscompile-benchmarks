name: webOS heavy deps benchmark/cache

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Ignore restored dependency cache and rebuild Qt + FFmpeg"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      cache_epoch:
        description: "Cache epoch. Blank = current UTC YYYY-MM. Change to force a new cache."
        required: false
        default: ""

      qt_build_script:
        description: "Path to the webOS Qt build script checked out by this workflow"
        required: true
        default: "webos-build/tools/webos-native/build-qt6-611.sh"

      build_qt:
        description: "Build static Qt using qt_build_script"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      build_ffmpeg:
        description: "Build static FFmpeg"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      ffmpeg_url:
        description: "FFmpeg source tarball URL"
        required: true
        default: "https://ffmpeg.org/releases/ffmpeg-8.1.tar.xz"

      ffmpeg_sha256:
        description: "Optional SHA256 for FFmpeg tarball. Empty = no verification."
        required: false
        default: ""

      parallel:
        description: "Build parallelism"
        required: true
        default: "4"

  schedule:
    # Keeps GitHub cache warm. GitHub cache eviction is access-based.
    - cron: "17 3 * * 1"

permissions:
  contents: read


jobs:
  build-heavy-deps:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    concurrency:
      group: webos-heavy-deps-${{ github.ref }}-${{ matrix.sdk_cache_id }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x64-host
            runner: ubuntu-24.04
            sdk_cache_id: linux-aarch64-via-qemu-x86_64
            sdk_asset_glob_1: "arm-webos-linux-gnueabi_sdk-buildroot_linux-aarch64.tar.bz2"
            sdk_asset_glob_2: ""
            needs_aarch64_binfmt: "true"

          - name: ubuntu-arm64-host
            runner: ubuntu-24.04-arm
            sdk_cache_id: linux-aarch64
            sdk_asset_glob_1: "arm-webos-linux-gnueabi_sdk-buildroot_linux-aarch64.tar.bz2"
            sdk_asset_glob_2: ""
            needs_aarch64_binfmt: "false"

    env:
      TARGET_PREFIX: /usr/local/webos-native

      # Release-ish target profile.
      WEBOS_OPT_LEVEL: -O2
      WEBOS_CPU_FLAGS: -mcpu=cortex-a53 -mthumb
      WEBOS_LTO_FLAG: -flto=auto
      WEBOS_EXTRA_OPT_FLAGS: -pipe -fuse-linker-plugin -ffunction-sections -fdata-sections
      WEBOS_EXTRA_LINK_FLAGS: -fuse-linker-plugin -Wl,--gc-sections

      QT_STATIC: "1"
      QT_BUILD_MEMORY_PER_JOB_MIB: "1536"
      QT_BUILD_MEMORY_RESERVE_MIB: "2048"
      QT_TARGET_BUILD_WITH_PCH: "OFF"
      QT_BUILD_PRUNE_COMPLETED: "1"

      # Keep static dependency cache smaller unless you explicitly want debug info.
      FFMPEG_DIAG_CFLAGS: ""

    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v4

      - name: Checkout Qt build scripts
        if: inputs.build_qt == 'true'
        uses: actions/checkout@v4
        with:
          repository: sachk/tern
          ref: master
          path: webos-build
          token: ${{ secrets.TERN_REPO_TOKEN }}

      - name: Install host tools
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            bzip2 \
            ca-certificates \
            cmake \
            coreutils \
            curl \
            file \
            findutils \
            flex \
            gawk \
            gh \
            git \
            gperf \
            jq \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libwayland-dev \
            libwayland-bin \
            libxkbcommon-dev \
            make \
            ninja-build \
            patch \
            perl \
            pkg-config \
            python3 \
            rsync \
            sed \
            tar \
            time \
            wayland-protocols \
            xz-utils \
            zstd

      - name: Enable aarch64 SDK emulation
        if: matrix.needs_aarch64_binfmt == 'true'
        run: |
          set -euxo pipefail

          sudo apt-get install -y binfmt-support qemu-user-static
          sudo update-binfmts --enable qemu-aarch64 || true
          update-binfmts --display qemu-aarch64 || true

      - name: Compute cache key
        id: key
        env:
          USER_CACHE_EPOCH: ${{ inputs.cache_epoch }}
          HASH_INPUTS: ${{ hashFiles('.github/workflows/webos-static-lto-bench.yml', 'webos-build/tools/**', 'webos-build/patches/**', 'webos-build/manifests/**', 'webos-build/**/qt-webos-*.json', 'webos-build/**/webos-third-party.json') }}
        run: |
          set -euxo pipefail

          if [[ -n "${USER_CACHE_EPOCH:-}" ]]; then
            epoch="$USER_CACHE_EPOCH"
          else
            epoch="$(date -u +%Y-%m)"
          fi

          flags_slug="o2-cortex-a53-thumb-lto-static-v2"
          hash_slug="${HASH_INPUTS:-nohash}"

          key="webos-heavy-deps-${{ matrix.sdk_cache_id }}-${flags_slug}-${epoch}-${hash_slug}"

          echo "epoch=$epoch" >> "$GITHUB_OUTPUT"
          echo "cache_key=$key" >> "$GITHUB_OUTPUT"

          echo "Cache key: $key"

      - name: Host facts
        run: |
          set -euxo pipefail
          mkdir -p results

          {
            echo "## Host facts"
            echo
            echo "**Runner:** ${{ matrix.runner }}"
            echo
            echo '```text'
            uname -a
            echo
            lscpu || true
            echo
            free -h || true
            echo
            df -h || true
            echo '```'
          } | tee results/host-facts.md

      - name: Restore webOS SDK cache
        id: sdk-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/webos-sdk/arm-webos-linux-gnueabi_sdk-buildroot
          key: webos-sdk-${{ matrix.sdk_cache_id }}-v3

      - name: Download and extract webOS SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SDK_GLOB_1: ${{ matrix.sdk_asset_glob_1 }}
          SDK_GLOB_2: ${{ matrix.sdk_asset_glob_2 }}
        run: |
          set -euxo pipefail

          SDK_PARENT="$RUNNER_TEMP/webos-sdk"
          rm -rf "$SDK_PARENT"
          mkdir -p "$SDK_PARENT"

          echo "Available native-toolchain releases:"
          gh release list --repo webosbrew/native-toolchain --limit 20

          found=""

          for tag in $(gh release list --repo webosbrew/native-toolchain --limit 30 --json tagName -q '.[].tagName'); do
            echo "Checking release $tag"

            assets="$(gh release view "$tag" --repo webosbrew/native-toolchain --json assets -q '.assets[].name')"
            printf '%s\n' "$assets"

            for pattern in "$SDK_GLOB_1" "$SDK_GLOB_2"; do
              [[ -n "$pattern" ]] || continue

              match=""
              while IFS= read -r asset_name; do
                if [[ "$asset_name" == "$pattern" ]]; then
                  match="$asset_name"
                  break
                fi
              done <<< "$assets"

              if [[ -n "$match" ]]; then
                echo "Downloading asset $match from release $tag"
                gh release download "$tag" \
                  --repo webosbrew/native-toolchain \
                  --pattern "$match" \
                  --dir "$SDK_PARENT" \
                  --clobber

                found="$SDK_PARENT/$match"
                break 2
              fi
            done
          done

          if [[ -z "$found" || ! -f "$found" ]]; then
            echo "error: no matching SDK asset found for patterns:" >&2
            echo "  $SDK_GLOB_1" >&2
            echo "  $SDK_GLOB_2" >&2
            exit 1
          fi

          cd "$SDK_PARENT"

          case "$found" in
            *.tar.gz)  tar -xzf "$found" ;;
            *.tar.bz2) tar -xjf "$found" ;;
            *.tar.xz)  tar -xJf "$found" ;;
            *) echo "Unknown SDK archive type: $found" >&2; exit 1 ;;
          esac

      - name: Save webOS SDK cache
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/webos-sdk/arm-webos-linux-gnueabi_sdk-buildroot
          key: webos-sdk-${{ matrix.sdk_cache_id }}-v3

      - name: Relocate and validate webOS SDK
        run: |
          set -euxo pipefail

          SDK_PARENT="$RUNNER_TEMP/webos-sdk"
          SDK_ROOT="$(find "$SDK_PARENT" -maxdepth 4 -type f -name relocate-sdk.sh -printf '%h\n' | head -n1)"

          if [[ -z "$SDK_ROOT" ]]; then
            echo "error: could not find relocate-sdk.sh under $SDK_PARENT" >&2
            find "$SDK_PARENT" -maxdepth 4 -type f | sort > results/sdk-files.txt
            head -200 results/sdk-files.txt
            exit 1
          fi

          test -f "$SDK_ROOT/relocate-sdk.sh"
          test -f "$SDK_ROOT/share/buildroot/toolchainfile.cmake"

          "$SDK_ROOT/relocate-sdk.sh"

          TOOL_PREFIX="$SDK_ROOT/bin/arm-webos-linux-gnueabi-"
          SYSROOT="$SDK_ROOT/arm-webos-linux-gnueabi/sysroot"

          test -x "${TOOL_PREFIX}gcc"
          test -x "${TOOL_PREFIX}g++"
          test -x "${TOOL_PREFIX}gcc-ar"
          test -x "${TOOL_PREFIX}gcc-ranlib"
          test -x "${TOOL_PREFIX}readelf"
          test -x "${TOOL_PREFIX}strip"
          test -d "$SYSROOT"

          {
            echo "WEBOS_SDK_ROOT=$SDK_ROOT"
            echo "SDK_ROOT=$SDK_ROOT"
            echo "SDK_BIN=$SDK_ROOT/bin"
            echo "SYSROOT=$SYSROOT"
            echo "TOOL_PREFIX=$TOOL_PREFIX"
            echo "TOOLCHAIN_FILE=$SDK_ROOT/share/buildroot/toolchainfile.cmake"
          } >> "$GITHUB_ENV"

          {
            echo "## SDK facts"
            echo
            echo "**SDK root:** \`$SDK_ROOT\`"
            echo
            echo '```text'
            "${TOOL_PREFIX}gcc" --version
            echo
            "${TOOL_PREFIX}g++" --version
            echo
            file "${TOOL_PREFIX}gcc" "${TOOL_PREFIX}g++" "${TOOL_PREFIX}gcc-ar" "${TOOL_PREFIX}gcc-ranlib"
            echo '```'
          } | tee results/sdk-facts.md

      - name: Restore heavy dependency cache
        id: deps-cache
        if: inputs.force_rebuild != 'true'
        uses: actions/cache/restore@v4
        with:
          path: |
            webos-build/build/qt6-*-host-install
            webos-build/build/qt6-*-target-static-install
            build/webos-ffmpeg-static-stage
            build/webos-ffmpeg-static-prefix
            build/downloads
          key: ${{ steps.key.outputs.cache_key }}

      - name: Decide whether to build
        id: decide
        run: |
          set -euxo pipefail

          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.deps-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static Qt via your script
        if: steps.decide.outputs.build_needed == 'true' && inputs.build_qt == 'true'
        env:
          QT_BUILD_SCRIPT: ${{ inputs.qt_build_script }}
          WEBOS_BUILD_JOBS: ${{ inputs.parallel }}

          WEBOS_COMMON_OPT_FLAGS: ${{ env.WEBOS_OPT_LEVEL }} ${{ env.WEBOS_CPU_FLAGS }} ${{ env.WEBOS_LTO_FLAG }} ${{ env.WEBOS_EXTRA_OPT_FLAGS }}
          WEBOS_COMMON_LINK_FLAGS: ${{ env.WEBOS_LTO_FLAG }} ${{ env.WEBOS_EXTRA_LINK_FLAGS }}

          WEBOS_TUNE_CFLAGS: ${{ env.WEBOS_OPT_LEVEL }} ${{ env.WEBOS_CPU_FLAGS }} ${{ env.WEBOS_LTO_FLAG }} ${{ env.WEBOS_EXTRA_OPT_FLAGS }}
          QT_TARGET_TUNE_CFLAGS: ${{ env.WEBOS_OPT_LEVEL }} ${{ env.WEBOS_CPU_FLAGS }} ${{ env.WEBOS_LTO_FLAG }} ${{ env.WEBOS_EXTRA_OPT_FLAGS }}

          QT_STATIC: "1"
          QT_BUILD_FRESH: "1"
          CI: "1"
        run: |
          set -euxo pipefail

          mkdir -p results
          test -f "$QT_BUILD_SCRIPT"
          chmod +x "$QT_BUILD_SCRIPT"

          QT_SCRIPT_DIR="$(cd "$(dirname "$QT_BUILD_SCRIPT")" && pwd)"
          QT_REPO_ROOT="$(cd "$QT_SCRIPT_DIR/../.." && pwd)"
          QT_BUILD_DIR="$QT_REPO_ROOT/build"

          start_ns="$(date +%s%N)"

          "$QT_BUILD_SCRIPT" all

          end_ns="$(date +%s%N)"

          python3 <<PY > results/qt-time-${{ matrix.name }}.json
          import json
          start = int("$start_ns")
          end = int("$end_ns")
          print(json.dumps({
              "runner": "${{ matrix.name }}",
              "component": "qt-static",
              "seconds": (end - start) / 1e9,
              "flags": "${{ env.WEBOS_OPT_LEVEL }} ${{ env.WEBOS_CPU_FLAGS }} ${{ env.WEBOS_LTO_FLAG }} ${{ env.WEBOS_EXTRA_OPT_FLAGS }}"
          }, indent=2))
          PY

          echo "Qt install prefixes:" | tee results/qt-prefixes.txt
          find "$QT_BUILD_DIR" -maxdepth 2 -type d \( -name 'qt6-*-host-install' -o -name 'qt6-*-target-static-install' \) -print | sort | tee -a results/qt-prefixes.txt

      - name: Build strict-whitelist static FFmpeg for webOS
        if: steps.decide.outputs.build_needed == 'true' && inputs.build_ffmpeg == 'true'
        env:
          FFMPEG_URL: ${{ inputs.ffmpeg_url }}
          FFMPEG_SHA256: ${{ inputs.ffmpeg_sha256 }}
          PARALLEL: ${{ inputs.parallel }}
        run: |
          set -euxo pipefail

          COMMON_FLAGS="${WEBOS_OPT_LEVEL} ${WEBOS_CPU_FLAGS} ${WEBOS_LTO_FLAG} ${WEBOS_EXTRA_OPT_FLAGS}"
          LINK_FLAGS="${WEBOS_LTO_FLAG} ${WEBOS_EXTRA_LINK_FLAGS}"

          mkdir -p build/downloads build/ffmpeg-src build/ffmpeg-build results

          archive="build/downloads/$(basename "$FFMPEG_URL")"

          if [[ ! -f "$archive" ]]; then
            curl -L --fail --retry 5 --retry-delay 2 "$FFMPEG_URL" -o "$archive"
          fi

          if [[ -n "${FFMPEG_SHA256:-}" ]]; then
            echo "${FFMPEG_SHA256}  ${archive}" | sha256sum -c -
          else
            echo "warning: FFMPEG_SHA256 empty; source tarball not verified" >&2
          fi

          rm -rf build/ffmpeg-src build/ffmpeg-build build/webos-ffmpeg-static-stage build/webos-ffmpeg-static-prefix
          mkdir -p build/ffmpeg-src build/ffmpeg-build build/webos-ffmpeg-static-stage

          tar -xf "$archive" -C build/ffmpeg-src --strip-components=1

          FFMPEG_STAGE="$GITHUB_WORKSPACE/build/webos-ffmpeg-static-stage"
          FFMPEG_PREFIX="$GITHUB_WORKSPACE/build/webos-ffmpeg-static-prefix"

          export PKG_CONFIG_LIBDIR="$FFMPEG_STAGE$TARGET_PREFIX/lib/pkgconfig:$SYSROOT$TARGET_PREFIX/lib/pkgconfig:$SYSROOT/usr/lib/pkgconfig:$SYSROOT/usr/share/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$SYSROOT"

          start_ns="$(date +%s%N)"

          cd build/ffmpeg-src

          ./configure \
            --prefix="$TARGET_PREFIX" \
            --arch=arm \
            --cpu=cortex-a53 \
            --enable-thumb \
            --target-os=linux \
            --enable-cross-compile \
            --cross-prefix="$SDK_BIN/arm-webos-linux-gnueabi-" \
            --cc="$SDK_BIN/arm-webos-linux-gnueabi-gcc" \
            --cxx="$SDK_BIN/arm-webos-linux-gnueabi-g++" \
            --ar="$SDK_BIN/arm-webos-linux-gnueabi-gcc-ar" \
            --ranlib="$SDK_BIN/arm-webos-linux-gnueabi-gcc-ranlib" \
            --strip="$SDK_BIN/arm-webos-linux-gnueabi-strip" \
            --pkg-config="$SDK_BIN/pkg-config" \
            \
            --disable-everything \
            --disable-programs \
            --disable-doc \
            --disable-debug \
            --disable-autodetect \
            --disable-iconv \
            \
            --enable-static \
            --disable-shared \
            --enable-pic \
            --enable-lto \
            --enable-optimizations \
            \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swresample \
            --enable-swscale \
            --enable-network \
            \
            --enable-protocol=file \
            --enable-protocol=http \
            --enable-protocol=https \
            --enable-protocol=tcp \
            --enable-protocol=tls \
            --enable-protocol=pipe \
            --enable-protocol=crypto \
            \
            --enable-demuxer=matroska \
            --enable-demuxer=mov \
            --enable-demuxer=mp3 \
            --enable-demuxer=flac \
            --enable-demuxer=wav \
            --enable-demuxer=ogg \
            --enable-demuxer=mpegts \
            --enable-demuxer=mpegps \
            --enable-demuxer=avi \
            --enable-demuxer=aac \
            --enable-demuxer=hls \
            --enable-demuxer=asf \
            --enable-demuxer=dsf \
            --enable-demuxer=dff \
            --enable-demuxer=wv \
            --enable-demuxer=ape \
            --enable-demuxer=tta \
            --enable-demuxer=ass \
            --enable-demuxer=srt \
            --enable-demuxer=webvtt \
            --enable-demuxer=sup \
            --enable-demuxer=vobsub \
            \
            --enable-parser=aac \
            --enable-parser=ac3 \
            --enable-parser=dca \
            --enable-parser=eac3 \
            --enable-parser=flac \
            --enable-parser=mlp \
            --enable-parser=mpegaudio \
            --enable-parser=opus \
            --enable-parser=vorbis \
            --enable-parser=h264 \
            --enable-parser=hevc \
            --enable-parser=av1 \
            --enable-parser=vp9 \
            --enable-parser=vc1 \
            --enable-parser=mpeg4video \
            --enable-parser=mpegvideo \
            \
            --enable-decoder=aac \
            --enable-decoder=ac3 \
            --enable-decoder=eac3 \
            --enable-decoder=alac \
            --enable-decoder=dca \
            --enable-decoder=truehd \
            --enable-decoder=mlp \
            --enable-decoder=flac \
            --enable-decoder=mp2 \
            --enable-decoder=mp3 \
            --enable-decoder=opus \
            --enable-decoder=vorbis \
            --enable-decoder=wmav1 \
            --enable-decoder=wmav2 \
            --enable-decoder=wmapro \
            --enable-decoder=wmalossless \
            --enable-decoder=wavpack \
            --enable-decoder=ape \
            --enable-decoder=tta \
            \
            --enable-decoder=pcm_bluray \
            --enable-decoder=pcm_dvd \
            --enable-decoder=pcm_f32le \
            --enable-decoder=pcm_f32be \
            --enable-decoder=pcm_f64le \
            --enable-decoder=pcm_f64be \
            --enable-decoder=pcm_s16le \
            --enable-decoder=pcm_s16be \
            --enable-decoder=pcm_s24le \
            --enable-decoder=pcm_s24be \
            --enable-decoder=pcm_s32le \
            --enable-decoder=pcm_s32be \
            --enable-decoder=pcm_u8 \
            --enable-decoder=pcm_s8 \
            --enable-decoder=pcm_mulaw \
            --enable-decoder=pcm_alaw \
            \
            --enable-decoder=dsd_lsbf \
            --enable-decoder=dsd_msbf \
            --enable-decoder=dsd_lsbf_planar \
            --enable-decoder=dsd_msbf_planar \
            --enable-decoder=dst \
            \
            --enable-decoder=ass \
            --enable-decoder=ssa \
            --enable-decoder=srt \
            --enable-decoder=subrip \
            --enable-decoder=text \
            --enable-decoder=webvtt \
            --enable-decoder=mov_text \
            --enable-decoder=hdmv_pgs_subtitle \
            --enable-decoder=dvdsub \
            --enable-decoder=dvbsub \
            --enable-decoder=ccaption \
            \
            --enable-decoder=mpeg1video \
            --enable-decoder=theora \
            --enable-decoder=h263 \
            --enable-decoder=vc1 \
            --enable-decoder=wmv3 \
            \
            --enable-encoder=aac \
            \
            --enable-muxer=spdif \
            --enable-muxer=adts \
            \
            --enable-bsf=h264_mp4toannexb \
            --enable-bsf=hevc_mp4toannexb \
            --enable-bsf=extract_extradata \
            --enable-bsf=dump_extra \
            --enable-bsf=h264_metadata \
            --enable-bsf=hevc_metadata \
            --enable-bsf=av1_metadata \
            \
            --extra-cflags="--sysroot=$SYSROOT -I$FFMPEG_STAGE$TARGET_PREFIX/include $COMMON_FLAGS ${FFMPEG_DIAG_CFLAGS:-}" \
            --extra-cxxflags="--sysroot=$SYSROOT -I$FFMPEG_STAGE$TARGET_PREFIX/include $COMMON_FLAGS ${FFMPEG_DIAG_CFLAGS:-}" \
            --extra-ldflags="--sysroot=$SYSROOT -L$FFMPEG_STAGE$TARGET_PREFIX/lib -Wl,-rpath-link,$FFMPEG_STAGE$TARGET_PREFIX/lib $LINK_FLAGS" \
            2>&1 | tee "$GITHUB_WORKSPACE/results/ffmpeg-configure-${{ matrix.name }}.log"

          make -j"$PARALLEL" 2>&1 | tee "$GITHUB_WORKSPACE/results/ffmpeg-make-${{ matrix.name }}.log"
          make DESTDIR="$FFMPEG_STAGE" install 2>&1 | tee "$GITHUB_WORKSPACE/results/ffmpeg-install-${{ matrix.name }}.log"

          cd "$GITHUB_WORKSPACE"

          mkdir -p "$FFMPEG_PREFIX"
          rsync -a "$FFMPEG_STAGE$TARGET_PREFIX/" "$FFMPEG_PREFIX/"

          end_ns="$(date +%s%N)"

          python3 <<PY > results/ffmpeg-time-${{ matrix.name }}.json
          import json
          start = int("$start_ns")
          end = int("$end_ns")
          print(json.dumps({
              "runner": "${{ matrix.name }}",
              "component": "ffmpeg-static",
              "seconds": (end - start) / 1e9,
              "flags": "$COMMON_FLAGS",
              "link_flags": "$LINK_FLAGS",
              "prefix": "$FFMPEG_PREFIX"
          }, indent=2))
          PY

          {
            echo "## FFmpeg static install"
            echo
            echo '```text'
            find "$FFMPEG_PREFIX" -maxdepth 4 -type f | sort
            echo
            echo "Static/shared library files:"
            find "$FFMPEG_PREFIX/lib" -maxdepth 1 -type f \( -name '*.a' -o -name '*.so*' \) -exec file {} \; | sort || true
            echo
            echo "Library sizes:"
            find "$FFMPEG_PREFIX/lib" -maxdepth 1 -type f -name '*.a' -printf '%M %10s %p\n' | sort || true
            echo '```'
          } | tee results/ffmpeg-install-${{ matrix.name }}.md

          if find "$FFMPEG_PREFIX/lib" -maxdepth 1 -type f -name 'libav*.so*' | grep -q .; then
            echo "error: shared FFmpeg libs were produced; expected static .a libs only" >&2
            exit 1
          fi

          test -f "$FFMPEG_PREFIX/lib/libavcodec.a"
          test -f "$FFMPEG_PREFIX/lib/libavformat.a"
          test -f "$FFMPEG_PREFIX/lib/libavutil.a"

          du -sh "$FFMPEG_PREFIX" | tee results/ffmpeg-prefix-size-${{ matrix.name }}.txt
          tar --zstd -cf "results/ffmpeg-static-prefix-${{ matrix.name }}.tar.zst" -C "$FFMPEG_PREFIX" .
          stat -c '%A %10s %n' "results/ffmpeg-static-prefix-${{ matrix.name }}.tar.zst" | tee results/ffmpeg-compressed-size-${{ matrix.name }}.txt

      - name: Save heavy dependency cache
        if: steps.decide.outputs.build_needed == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            webos-build/build/qt6-*-host-install
            webos-build/build/qt6-*-target-static-install
            build/webos-ffmpeg-static-stage
            build/webos-ffmpeg-static-prefix
            build/downloads
          key: ${{ steps.key.outputs.cache_key }}

      - name: Package dependency prefixes as artifacts
        if: always()
        run: |
          set -euxo pipefail

          mkdir -p artifacts results

          if compgen -G "webos-build/build/qt6-*-host-install" >/dev/null; then
            tar --zstd -cf "artifacts/qt-host-${{ matrix.name }}.tar.zst" webos-build/build/qt6-*-host-install
          fi

          if compgen -G "webos-build/build/qt6-*-target-static-install" >/dev/null; then
            tar --zstd -cf "artifacts/qt-target-static-${{ matrix.name }}.tar.zst" webos-build/build/qt6-*-target-static-install
          fi

          if [[ -d build/webos-ffmpeg-static-prefix ]]; then
            tar --zstd -cf "artifacts/ffmpeg-static-${{ matrix.name }}.tar.zst" build/webos-ffmpeg-static-prefix
          fi

          {
            echo "## webOS heavy deps: ${{ matrix.name }}"
            echo
            echo "### Timing"
            echo
            echo '```json'
            cat results/*time-${{ matrix.name }}.json 2>/dev/null || true
            echo '```'
            echo
            if [[ -f results/host-facts.md ]]; then cat results/host-facts.md; fi
            echo
            if [[ -f results/sdk-facts.md ]]; then cat results/sdk-facts.md; fi
            echo
            echo "### Artifacts"
            echo
            echo '```text'
            find artifacts -maxdepth 1 -mindepth 1 -printf '%M %10s %p\n' | sort || true
            echo '```'
          } | tee "results/summary-${{ matrix.name }}.md"

          cat "results/summary-${{ matrix.name }}.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark logs/results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webos-heavy-deps-results-${{ matrix.name }}
          path: |
            results/
          retention-days: 30

      - name: Upload packaged dependency prefixes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webos-heavy-deps-prefixes-${{ matrix.name }}
          path: |
            artifacts/
          retention-days: 14
